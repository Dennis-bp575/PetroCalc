<!DOCTYPE html>
<html lang="pt-br">
    <head>
      <!-- Configurações de App (PWA) -->
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
      <!-- Manifest Simplificado (Simula o F11) -->
      <link rel="manifest" href="manifest.json">
      <meta name="theme-color" content="#2563eb">
    
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>PetroCalc</title>
    
      <!-- Tailwind e Google Fonts -->
      <script src="https://cdn.tailwindcss.com"></script>
      <link href="https://googleapis.com" rel="stylesheet">
    
      <script>
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
          }
      </script>
      <style>
          body { font-family: 'Inter', sans-serif; }
          .aba-ativa {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
            font-weight: 700;
          }
          .botao-grande { min-height: 64px; }
      </style>
    </head>
    <body class="bg-slate-100 flex justify-center min-h-screen">
        <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-sm sm:rounded-3xl overflow-hidden">
            <div class="p-6 flex-1">
                <div class="bg-gradient-to-r bg-indigo-800
                    text-white rounded-sm p-8 mb-8 shadow-xl">
                    <header class="flex items-center gap-3">
                          <!-- Símbolo Petrobras (Sem o BR) -->
                          <div class="relative w-7 h-7 bg-[#007f3f] rounded-sm shadow-sm flex flex-col justify-end p-[2px]">
                                <!-- Faixa Amarela Superior -->                        
                                <div class="absolute top-[2px] left-[2px] right-[2px] h-[8px] bg-[#ffc632] border-b-2 border-white"></div>
                          </div>
                          <!-- Título na mesma linha -->
                          <h1 class="text-4xl font-bold text-white tracking-wide">PetroCalc</h1>
                    </header>
                </div>
                
                <div class="space-y-6 max-w-md w-full mx-auto">
                      <div class="flex flex-col gap-2 max-w-md w-full">
                              <!-- Rótulo do Dropdown -->
                              <label for="produto" class="text-xl font-semibold text-slate-300">
                                Selecione o Produto:
                              </label>
                              
                              <!-- Menu Dropdown -->
                              <select 
                                id="produto" 
                                name="produto" 
                                class="w-full p-3 bg-indigo-700 border border-slate-700 rounded-lg text-white font-medium text-base focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px_12px] bg-[right_1rem_center] bg-no-repeat pr-10"
                              >
                                <option value="petroleo" class="bg-indigo-700 text-white">Petróleo</option>
                                <option value="diesel" class="bg-indigo-700 text-white">Diesel</option>
                                <option value="gasolina" class="bg-indigo-700 text-white">Gasolina</option>
                                <option value="alcool" class="bg-indigo-700 text-white">Álcool</option>
                              </select>
                      </div>

                      <div class="flex items-center justify-between gap-4 max-w-md w-full">
                          <!-- Rótulo do Input -->
                          <label for="densidade" class="text-base font-extrabold text-slate-900 whitespace-nowrap">
                            Densidade lida:
                          </label>
                          
                          <!-- Campo de Entrada -->
                          <input 
                            type="text" 
                            id="densidade" 
                            name="densidade" 
                            inputmode="decimal"
                            class="w-32 p-2.5 bg-slate-800/80 border border-slate-700 rounded-lg text-white font-extrabold text-right focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                            placeholder="0,0000"
                          />
                    </div>
                     <!-- Bloco da Temperatura lida -->
                    <div class="flex items-center justify-between gap-4">
                      <!-- Rótulo do Input -->
                      <label for="temperatura" class="text-base font-extrabold text-slate-900 whitespace-nowrap">
                        Temperatura lida em °C:
                      </label>
                      
                      <!-- Campo de Entrada -->
                      <input 
                        type="text" 
                        id="temperatura" 
                        name="temperatura" 
                        value="20,0" 
                        inputmode="decimal"
                        class="w-32 p-2.5 bg-slate-800/80 border border-slate-700 rounded-lg text-white font-extrabold text-right focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                        placeholder="20,0"
                      />
                    </div>

                </div>
                

            
            
            </div>
        </div>
        
    </body>



</html>
