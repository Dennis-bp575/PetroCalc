<!DOCTYPE html>
<html lang="pt-br">
    <head>
      <!-- Configurações de App (PWA) -->
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
      <!-- Manifest Simplificado (Simula o F11) -->
      <link rel="manifest" href="manifest.json">
      <meta name="theme-color" content="#2563eb">
    
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>PetroCalc</title>
    
      <!-- Tailwind e Google Fonts -->
      <script src="https://cdn.tailwindcss.com"></script>
      <link href="https://googleapis.com" rel="stylesheet">
    
      <script>
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
          }
      </script>
      <style>
          body { font-family: 'Inter', sans-serif; }
          .aba-ativa {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
            font-weight: 700;
          }
          .botao-grande { min-height: 64px; }
      </style>
    </head>
    <body class="bg-slate-100 flex justify-center min-h-screen">
        <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-sm sm:rounded-3xl overflow-hidden">
            <div class="p-6 flex-1">
                <div class="bg-gradient-to-r bg-indigo-800
                    text-white rounded-sm p-8 mb-8 shadow-xl">
                    <header class="flex items-center gap-3">
                          <!-- Símbolo Petrobras (Sem o BR) -->
                          <div class="relative w-7 h-7 bg-[#007f3f] rounded-sm shadow-sm flex flex-col justify-end p-[2px]">
                                <!-- Faixa Amarela Superior -->                        
                                <div class="absolute top-[2px] left-[2px] right-[2px] h-[8px] bg-[#ffc632] border-b-2 border-white"></div>
                          </div>
                          <!-- Título na mesma linha -->
                          <h1 class="text-4xl font-bold text-white tracking-wide">PetroCalc</h1>
                    </header>
                </div>
                
                <div class="space-y-6 max-w-md w-full mx-auto">
                      <div class="flex flex-col gap-2 max-w-md w-full">
                              <!-- Rótulo do Dropdown -->
                              <label for="produto" class="text-xl font-semibold text-slate-900">
                                Selecione o Produto:
                              </label>
                              
                              <!-- Menu Dropdown -->
                              <select 
                                id="produto" 
                                name="produto" 
                                class="w-full p-3 bg-indigo-700 border border-slate-700 rounded-lg text-white font-medium text-base focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px_12px] bg-[right_1rem_center] bg-no-repeat pr-10"
                              >
                                <option value="petroleo" class="bg-indigo-700 text-white">Petróleo</option>
                                <option value="diesel" class="bg-indigo-700 text-white">Diesel</option>
                                <option value="gasolina" class="bg-indigo-700 text-white">Gasolina</option>
                                <option value="alcool" class="bg-indigo-700 text-white">Álcool</option>
                              </select>
                      </div>

                      <div class="flex items-center justify-between gap-4 max-w-md w-full">
                          <!-- Rótulo do Input -->
                          <label for="densidade" class="text-base font-extrabold text-slate-900 whitespace-nowrap">
                            Densidade medida:
                          </label>
                          
                          <!-- Campo de Entrada -->
                          <input 
                            type="text" 
                            id="densidade" 
                            name="densidade" 
                            inputmode="decimal"
                            class="w-32 p-2.5 bg-slate-800/80 border border-slate-700 rounded-lg text-white font-extrabold text-right focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                            placeholder="0,0000"
                          />
                    </div>
                     <!-- Bloco da Temperatura lida -->
                    <div class="flex items-center justify-between gap-4">
                      <!-- Rótulo do Input -->
                      <label for="temperatura" class="text-base font-extrabold text-slate-900 whitespace-nowrap">
                        Temperatura medida em °C:
                      </label>
                      
                      <!-- Campo de Entrada -->
                      <input 
                        type="text" 
                        id="temperatura" 
                        name="temperatura" 
                        value="20,0" 
                        inputmode="decimal"
                        class="w-32 p-2.5 bg-slate-800/80 border border-slate-700 rounded-lg text-white font-extrabold text-right focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                        placeholder="20,0"
                      />
                    </div>
                    <!-- Botão Calcular -->
                    <button 
                          type="submit" 
                          class="w-full mt-4 p-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-lg rounded-lg transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98]"
                        >
                          Calcular
                    </button>
                    
                    <!-- Área para exibir o Resultado (Inicia escondida com 'hidden') -->
                    <div id="resultado-container" class="hidden mt-6 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-center">
                          <p class="text-sm font-medium text-emerald-400">Resultado do Cálculo:</p>
                          <p id="resultado-texto" class="text-2xl font-bold text-white mt-1">0,0000</p>
                    </div>

                </div>
                

            
            
            </div>
        </div>
        <script>
              // Intercepta o clique do botão / envio do formulário
              document.querySelector('form').addEventListener('submit', function(event) {
                event.preventDefault(); // Impede a página de recarregar
            
                // 1. Captura os valores que o usuário digitou ou selecionou na tela
                const produto = document.getElementById('produto').value;
                const densidadeTexto = document.getElementById('densidade').value;
                const temperaturaTexto = document.getElementById('temperatura').value;
            
                // 2. Limpeza dos dados: Transforma textos com vírgula em números decimais que o JS entende
                const densidadeNum = parseFloat(densidadeTexto.replace(',', '.'));
                const temperaturaNum = parseFloat(temperaturaTexto.replace(',', '.'));
            
                // Validação simples caso o usuário apague tudo e deixe em branco
                if (isNaN(densidadeNum) || isNaN(temperaturaNum)) {
                  alert("Por favor, preencha os campos de densidade e temperatura corretamente.");
                  return;
                }
            
                // 3. --- SUA FÓRMULA DE CÁLCULO ---
                // Criei uma lógica de exemplo baseada no produto selecionado
                let resultadoFinal = 0;
            
                if (produto === 'petroleo') {
                  resultadoFinal = convertDensity20to15(densidadeNum);
                } else if (produto === 'gasolina') {
                  resultadoFinal = densidadeNum * 1.2;
                } else if (produto === 'diesel') {
                  resultadoFinal = densidadeNum * 1.1;
                } else if (produto === 'alcool') {
                  resultadoFinal = densidadeNum * 0.9;
                }
                // ----------------------------------
            
                // 4. Formata o resultado de volta para o padrão brasileiro (com vírgula e 4 casas decimais)
                const resultadoFormatado = resultadoFinal.toFixed(4).replace('.', ',');
            
                // 5. Exibe o resultado na tela de forma elegante
                document.getElementById('resultado-texto').innerText = resultadoFormatado;
                document.getElementById('resultado-container').classList.remove('hidden');
              });

                /**
                 * Converte densidade de petróleo de 20°C para 15°C conforme ASTM D1250 (API 11.1 - Tabela 53A)
                 * 
                 * @param {number} rho20 - Densidade a 20°C (ex: 0.8800 ou 880.0)
                 * @param {string} outputUnit - 'auto' (mesma unidade da entrada), 'gcm3' ou 'kgm3'
                 * @returns {number} Densidade a 15°C na unidade solicitada
                 */
                function convertDensity20to15(rho20, outputUnit = 'auto') {
                    // 1. Detectar a unidade de entrada (se < 2, assume g/cm³)
                    const inputIsGcm3 = (rho20 < 2);
                    let rho20_kgm3 = inputIsGcm3 ? rho20 * 1000 : rho20;
                
                    // 2. Validar faixa permitida pela ASTM
                    if (rho20_kgm3 < 840 || rho20_kgm3 > 930) {
                        console.warn('Densidade fora da faixa recomendada (840-930 kg/m³). O resultado pode ser impreciso.');
                    }
                
                    // 3. Coeficientes ASTM D1250 (Crude Oils / Generalized Products)
                    const K0 = 613.97226;
                    const K1 = 0.0;
                    const K2 = 0.0;
                    const dT = 5.0; // 20°C - 15°C
                
                    // 4. Iteração de Newton (ou ponto fixo) para encontrar ρ15
                    let rho15 = rho20_kgm3; // chute inicial
                    for (let i = 0; i < 12; i++) {
                        // Coeficiente de expansão térmica a 15°C
                        const alpha = K0 / (rho15 * rho15) + K1 / rho15 + K2;
                        
                        // Fator de correção de volume (VCF) - da equação ASTM
                        // ρ20 = ρ15 * exp(-α * ΔT * (1 + 0.8 * α * ΔT))
                        const vcf = Math.exp(-alpha * dT * (1 + 0.8 * alpha * dT));
                        
                        // Atualiza ρ15 (ponto fixo: ρ15 = ρ20 / VCF)
                        rho15 = rho20_kgm3 / vcf;
                    }
                
                    // 5. Formatar a saída conforme a unidade solicitada
                    if (outputUnit === 'gcm3' || (outputUnit === 'auto' && inputIsGcm3)) {
                        return parseFloat((rho15 / 1000).toFixed(6)); // retorna em g/cm³
                    }
                    return parseFloat(rho15.toFixed(6)); // retorna em kg/m³
                }


        </script>




        
    </body>



</html>
