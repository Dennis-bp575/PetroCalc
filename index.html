<!DOCTYPE html>
<html lang="pt-br">
    <head>
      <!-- Configurações de App (PWA) -->
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
      <!-- Manifest Simplificado (Simula o F11) -->
      <link rel="manifest" href="manifest.json">
      <meta name="theme-color" content="#2563eb">
    
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>PetroCalc</title>
    
      <!-- Tailwind e Google Fonts -->
      <script src="https://cdn.tailwindcss.com"></script>
      <link href="https://googleapis.com" rel="stylesheet">
    
      <script>
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
          }
      </script>
      <style>
          body { font-family: 'Inter', sans-serif; }
          .aba-ativa {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
            font-weight: 700;
          }
          .botao-grande { min-height: 64px; }
      </style>
    </head>
    <body class="bg-slate-100 flex justify-center min-h-screen">
        <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-sm sm:rounded-3xl overflow-hidden">
            <div class="p-6 flex-1">
                <div class="bg-gradient-to-r bg-indigo-800
                    text-white rounded-sm p-8 mb-8 shadow-xl">
                    <header class="flex items-center gap-3">
                          <!-- Símbolo Petrobras (Sem o BR) -->
                          <div class="relative w-7 h-7 bg-[#007f3f] rounded-sm shadow-sm flex flex-col justify-end p-[2px]">
                            <!-- Faixa Amarela Superior -->
                            <div class="absolute top-[2px] left-[2px] right-[2px] h-[5px] bg-[#ffc632]"></div>
                          </div>
                          <!-- Título na mesma linha -->
                          <h1 class="text-4xl font-bold text-white tracking-wide">PetroCalc</h1>
                    </header>
                </div>
                <div class="w-full max-w-xs mx-auto">
                  <label class="block text-sm font-medium text-slate-500 mb-2">Selecione o Produto</label>
                  <div class="space-y-2">
                        <!-- Opção: Petróleo -->
                        <label class="flex items-center justify-between p-3 rounded-none border border-slate-700 bg-indigo-500 hover:bg-slate-800 cursor-pointer transition text-white">
                              <span class="font-medium text-sm">Petróleo</span>
                              <input type="radio" name="produto" value="petroleo" class="w-4 h-4 text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500">
                        </label>
                
                        <!-- Opção: Diesel -->
                        <label class="flex items-center justify-between p-3 rounded-none border border-slate-700 bg-indigo-500 hover:bg-slate-800 cursor-pointer transition text-white">
                          <span class="font-medium text-sm">Diesel</span>
                          <input type="radio" name="produto" value="diesel" class="w-4 h-4 text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500">
                        </label>
                
                        <!-- Opção: Gasolina -->
                        <label class="flex items-center justify-between p-3 rounded-none border border-slate-700 bg-indigo-500 hover:bg-slate-800 cursor-pointer transition text-white">
                          <span class="font-medium text-sm">Gasolina</span>
                          <input type="radio" name="produto" value="gasolina" class="w-4 h-4 text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500">
                        </label>
                
                        <!-- Opção: Álcool -->
                        <label class="flex items-center justify-between p-3 rounded-none border border-slate-700 bg-indigo-500 hover:bg-slate-800 cursor-pointer transition text-white">
                          <span class="font-medium text-sm">Álcool</span>
                          <input type="radio" name="produto" value="alcool" class="w-4 h-4 text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500">
                        </label>
                  </div>
                </div>
            </div>

            

        </div>
        
    </body>



</html>
